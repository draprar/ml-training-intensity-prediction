<!DOCTYPE html>
    <html lang="pl">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Predykcja intensywności treningu</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
        <script defer src="{{ url_for('static', path='js/main.js') }}"></script>
    </head>

    <body>
        <div class="container mt-5">
            <h2 class="mb-4">Predykcja intensywności treningu (kcal/min)</h2>
            <div class="card shadow-sm p-4">
                <form id="predictForm" class="row g-3">

                    <!-- WYBÓR AKTYWNOŚCI -->
                    <div class="col-md-6">
                        <label for="ActivityType" class="form-label fw-bold">Wybierz typ aktywności</label>
                        <select name="Activity_Type" id="ActivityType" class="form-select" required>
                            <option value="">-- wybierz --</option>
                            <option value="Walking">Chodzenie</option>
                            <option value="Yoga">Joga</option>
                            <option value="Strength">Trening siłowy</option>
                            <option value="Cardio">Kardio</option>
                        </select>
                    </div>

                    <!-- POLA SPECYFICZNE -->
                    <div class="col-md-4 specific-field d-none" id="DistanceField">
                        <label for="Distance" class="form-label">Dystans (km)</label>
                        <input type="number" id="Distance" name="Distance" step="0.01" class="form-control">
                    </div>

                    <div class="col-md-4 specific-field d-none" id="StepsField">
                        <label for="Steps" class="form-label">Liczba kroków</label>
                        <input type="number" id="Steps" name="Steps" class="form-control">
                    </div>

                    <div class="col-md-4 specific-field d-none" id="AvgStressField">
                        <label for="Avg_Stress" class="form-label">Średni stres</label>
                        <input type="number" id="Avg_Stress" name="Avg_Stress" step="0.1" class="form-control">
                    </div>

                    <div class="col-md-4 specific-field d-none" id="StressChangeField">
                        <label for="Stress_Change" class="form-label">Zmiana stresu</label>
                        <input type="number" id="Stress_Change" name="Stress_Change" step="0.1" class="form-control">
                    </div>

                    <div class="col-md-4 specific-field d-none" id="TotalRepsField">
                        <label for="Total_Reps" class="form-label">Liczba powtórzeń</label>
                        <input type="number" id="Total_Reps" name="Total_Reps" class="form-control">
                    </div>

                    <div class="col-md-4 specific-field d-none" id="TotalPosesField">
                        <label for="Total_Poses" class="form-label">Liczba serii</label>
                        <input type="number" id="Total_Poses" name="Total_Poses" class="form-control">
                    </div>

                    <!-- POLA WSPÓLNE -->
                    <div class="col-md-4 common-field d-none">
                        <label for="Avg_HR" class="form-label">Średnie tętno</label>
                        <input type="number" id="Avg_HR" name="Avg_HR" step="0.1" class="form-control">
                    </div>

                    <div class="col-md-4 common-field d-none">
                        <label for="Max_HR" class="form-label">Maksymalne tętno</label>
                        <input type="number" id="Max_HR" name="Max_HR" step="0.1" class="form-control">
                    </div>

                    <div class="col-md-3 common-field d-none">
                        <label for="day_of_week" class="form-label">Dzień tygodnia (0–6)</label>
                        <input type="number" id="day_of_week" name="day_of_week" min="0" max="6" class="form-control">
                    </div>

                    <div class="col-md-3 common-field d-none">
                        <label for="hour" class="form-label">Godzina (0–23)</label>
                        <input type="number" id="hour" name="hour" min="0" max="23" class="form-control">
                    </div>

                    <!-- PREDYKCJA PRZYCISK-->
                    <div class="col-12 mt-3 d-none" id="PredictButtonWrapper">
                        <button type="submit" class="btn btn-primary">Wykonaj predykcję</button>
                    </div>

                </form>
            </div>

            <!-- WYNIK -->
            <div id="resultBox" class="alert alert-info mt-4 d-none"></div>
        </div>
    </body>
    </html>
